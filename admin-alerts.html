        <style>
            /* ... आपका पुराना CSS यहाँ रहेगा (मैंने इसे नहीं बदला) ... */
            body {
                background: #050505;
                color: white;
                font-family: 'Poppins', sans-serif;
                display: flex;
                justify-content: center;
                align-items: center;
                height: 100vh;
                margin: 0;
            }

            .admin-card {
                background: #1e293b;
                padding: 40px;
                border-radius: 20px;
                border: 1px solid #a020f0;
                width: 400px;
                box-shadow: 0 0 30px rgba(160, 32, 240, 0.2);
                text-align: center;
            }

            h2 {
                color: #a020f0;
                margin-bottom: 20px;
                text-transform: uppercase;
            }

            input,
            textarea {
                width: 100%;
                background: #050505;
                border: 1px solid rgba(160, 32, 240, 0.5);
                border-radius: 10px;
                color: white;
                padding: 15px;
                outline: none;
                margin-bottom: 15px;
                box-sizing: border-box;
            }

            textarea {
                height: 100px;
                resize: none;
            }

            button {
                width: 100%;
                padding: 12px;
                background: #a020f0;
                color: white;
                border: none;
                border-radius: 10px;
                font-weight: bold;
                cursor: pointer;
                transition: 0.3s;
            }

            button:hover {
                background: white;
                color: #a020f0;
                box-shadow: 0 0 20px #a020f0;
            }
        </style>
    </head>

<body>
      <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L" height="0" width="0"

<div class="admin-card">
    <h2>Post <span>Live Alert</span> 🔔</h2>

    <input type="text" id="admin-title" placeholder="Alert Title (e.g. MARKET UPDATE)">
    <textarea id="admin-msg" placeholder="Type Market Alert (e.g. NIFTY Bullish Move!)"></textarea>

    <button id="sendBtn" onclick="sendAlert()">BROADCAST ALERT 🚀</button>

    <p id="status" style="margin-top: 15px; font-size: 0.8rem; color: #22c55e; display: none;">
        ✅ Alert & Push Sent Successfully!
    </p>
   <div style="margin-top:15px;">
  <a href="dashboard.html"
     onmouseover="this.style.background='#1d4ed8'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.2)'"
     onmouseout="this.style.background='#2563eb'; this.style.transform='scale(1)'; this.style.boxShadow='none'"
     style="display:inline-block; background:#2563eb; color:white; padding:8px 14px; border-radius:8px; font-size:12px; font-weight:bold; text-decoration:none; transition:all 0.2s ease;">
    BACK TO DASHBOARD
  </a>
</div>
</div>

    <script src="js/config.js"></script>

   <script src="js/admin-alart.js"></script>
     <script src="js/security.js"></script>
