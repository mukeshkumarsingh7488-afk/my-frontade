<html lang="hi">

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title -->
    <title>Bulk Email Panel | BR30 Trader</title>

    <meta name="robots" content="noindex, nofollow" />

    <!-- ❌ No Cache -->

      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />

    <meta http-equiv="Expires" content="0" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <!-- ✅ Axios -->
    <script
      src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"
      defer
    ></script>
    <style>
      body {
        font-family: Georgia, "Times New Roman", Times, serif;
        background: #050505;
        color: #e0e0e0;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 100vh;
        margin: 0;
      }

      .email-card {
        background: #1e293b;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.7);
        width: 100%;
        max-width: 550px;
        border: 1px solid #333;
      }

      h2 {
        text-align: center;
        color: #a020f0;
        margin-bottom: 25px;
        letter-spacing: 1px;
      }

      .form-group {
        margin-bottom: 20px;
      }

      label {
        display: block;
        margin-bottom: 8px;
        color: #a020f0;
        font-size: 13px;
        font-weight: bold;
        text-transform: uppercase;
      }

      input,
      textarea {
        width: 100%;
        padding: 14px;
        border-radius: 8px;
        border: 1px solid #444;
        background: #262626;
        color: white;
        box-sizing: border-box;
        font-size: 16px;
        outline: none;
        transition: 0.3s;
      }

      input:focus,
      textarea:focus {
        border-color: #a020f0;
        box-shadow: 0 0 8px rgba(0, 230, 118, 0.3);
      }

      textarea {
        height: 150px;
        resize: none;
        line-height: 1.5;
      }

      button {
        width: 100%;
        padding: 15px;
        background: #a020f0;
        border: none;
        border-radius: 8px;
        color: #000;
        font-weight: 800;
        cursor: pointer;
        font-size: 17px;
        transition: 0.4s;
        margin-top: 15px;
        text-transform: uppercase;
      }

      button:hover {
        background: #a020f0;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 230, 118, 0.4);
      }

      button:disabled {
        background: #444;
        color: #888;
        cursor: not-allowed;
        transform: none;
      }

      #status-msg {
        text-align: center;
        margin-top: 20px;
        font-size: 15px;
        font-weight: 500;
        min-height: 20px;
      }

      .loader {
        color: #ffab00;
      }

      .success {
        color: #00e676;
      }

      .error {
        color: #ff5252;
      }
    </style>
  </head>

  <body>
    <!-- ✅ GTM noscript -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <div class="email-card">
      <h2>Admin Bulk Email 📧</h2>
      <a
        href="seller-analytics.html"
        class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-xs font-bold transition"
        >BACK TO Dashbord</a
      >

      <div class="form-group">
        <label>Subject</label>
        <input
          type="text"
          id="email-subject"
          placeholder="Eg: Live Market Update 🚀"
        />
      </div>

      <div class="form-group">
        <label>Aapka Message</label>
        <textarea
          id="email-message"
          placeholder="Sabhi users ko kya bhejba hai? (Ye HTML template ke andar jayega)"
        ></textarea>
      </div>

      <button id="send-bulk-btn">Sabko Mail Bhejo</button>
      <div id="status-msg"></div>
    </div>

    <script src="config.js"></script>
    <script>
      /**
       * BR30ᴛʀᴀᴅᴇʀ - BULK ANNOUNCEMENT MODULE
       * Logic for sending Neon Green Mails to all users via Admin Panel
       */

      // 1. SELECTORS
      const sendBulkBtn = document.getElementById("send-bulk-btn");
      const statusMsg = document.getElementById("status-msg");
      const emailSub = document.getElementById("email-subject");
      const emailMsg = document.getElementById("email-message");

      /**
       * @description: Function to trigger the Bulk Email API
       */
      if (sendBulkBtn) {
        sendBulkBtn.addEventListener("click", async (e) => {
          e.preventDefault(); // Safety first

          const subject = emailSub.value.trim();
          const message = emailMsg.value.trim();

          // localStorage se admin token nikalna zaroori hai authentication ke liye
          const authToken = localStorage.getItem("token");

          // Validation: Empty inputs check
          if (!subject || !message) {
            return alert(
              "Bhai, Subject aur Message dono likhna zaroori hai! ⚠️",
            );
          }

          // Validation: Admin session check
          if (!authToken) {
            alert("Admin token nahi mila! Pehle login karein. 🔑");
            window.location.href = "login.html";
            return;
          }

          // --- Visual Loading States ---
          sendBulkBtn.innerText = "⏳ BHEJ RAHA HOON...";
          sendBulkBtn.disabled = true;
          statusMsg.innerHTML =
            '<span class="loader" style="color: #00ff88;">Database se users nikaal kar mail bhej raha hoon...</span>';

          try {
            /**
             * API CALL: Sending broadcast to /api/admin/email/send-all-email
             */
            const response = await fetch(
              `${window.API_BASE_URL}/api/admin/email/send-all-email`,
              {
                method: "POST",
                headers: {
                  "Content-Type": "application/json",
                  "x-auth-token": authToken, // Backend 'auth' middleware isse check karega
                },
                body: JSON.stringify({ subject, message }),
              },
            );

            const data = await response.json();

            // SUCCESS HANDLING
            if (response.ok) {
              statusMsg.innerHTML = `<span class="success" style="color: #00ff88; font-weight: bold;">✅ ${data.msg}</span>`;
              emailSub.value = "";
              emailMsg.value = "";

              // 4 second baad success message hide kar do
              setTimeout(() => {
                statusMsg.innerHTML = "";
              }, 4000);
            }
            // ERROR HANDLING (Server Side)
            else {
              statusMsg.innerHTML = `<span class="error" style="color: #ff4d4d;">❌ Error: ${data.msg || "Server issue"}</span>`;
            }
          } catch (err) {
            // ERROR HANDLING (Network/Connection)
            console.error("Fetch Error:", err);
            statusMsg.innerHTML =
              '<span class="error" style="color: #ff4d4d;">❌ Server se connect nahi ho paya! URL ya CORS check karo.</span>';
          } finally {
            // RESET BUTTON STATE
            sendBulkBtn.innerText = "SABKO MAIL BHEJO 🚀";
            sendBulkBtn.disabled = false;
          }
        });
      }

      /**
       * ENTER KEY NAVIGATION (Subject -> Message)
       */
      if (emailSub) {
        emailSub.addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            e.preventDefault();
            emailMsg.focus();
          }
        });
      }

      console.log("📢 Bulk Mail Module Initialized.");
    </script>
    <!-- Dashboard Logic (Type Module) -->
    <script type="module" src="script.js"></script>
    <script></script>
  </body>
</html>
