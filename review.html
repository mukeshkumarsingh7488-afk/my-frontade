    <style>
      :root {
        --bg: #0a0a0a;
        --card: #141414;
        --primary: #00ffa3;
        --danger: #ff4d4d;
        --text: #ffffff;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 10px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      /* Search Box Style */
      .search-container {
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 15px 0;
        z-index: 100;
      }

      #searchUser {
        width: 100%;
        padding: 12px 20px;
        border-radius: 25px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: white;
        outline: none;
        font-size: 1rem;
      }

      #searchUser:focus {
        border-color: var(--primary);
      }

      .review-card {
        background: var(--card);
        border-left: 4px solid var(--primary);
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .user-info {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .stars {
        color: #ffd700;
      }

      .comment {
        margin: 10px 0;
        color: #ccc;
      }

      .status-tag {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: bold;
      }

      .status-approved {
        background: rgba(0, 255, 163, 0.2);
        color: var(--primary);
      }

      .status-hidden {
        background: rgba(255, 77, 77, 0.2);
        color: var(--danger);
      }

      .actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        cursor: pointer;
        border: none;
        padding: 8px 18px;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        opacity: 0.8;
      }

      .btn-reply {
        background: #333;
        color: white;
      }

      .btn-hide {
        background: orange;
        color: black;
      }

      .btn-delete {
        background: var(--danger);
        color: white;
      }

      /* Reply Box Animation */
      .reply-box {
        margin-top: 15px;
        display: none;
        padding: 10px;
        background: #1c1c1c;
        border-radius: 8px;
        border: 1px solid #333;
      }

      textarea {
        width: 100%;
        background: #222;
        border: 1px solid #444;
        color: white;
        padding: 10px;
        border-radius: 5px;
        resize: none;
        min-height: 80px;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body onclick="closeAllReplyBoxes(event)">

<!-- 1. Sticky Wrapper (Top Gap और Side Movement Fix) -->
<!-- 1. Sticky Wrapper (Top Space 0 करने के लिए) -->
<div style="
    position: sticky; 
    top: 0; 
    z-index: 1000; 
    background: #000; 
    width: 100%; 
    margin: 0; 
    padding: 10px 0; 
    border-bottom: 2px solid #222; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
">
  
  <!-- Main Header Container -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 20px;">
    <h2 style="margin:0; font-size: 18px; color: #00ff88; white-space: nowrap;">Review Management Panel</h2>

    <div style="background: #1a1a1a; padding: 5px 12px; border-radius: 6px; border-left: 3px solid #00ff88; min-width: 100px; text-align: center;">
      <small style="color: #888; text-transform: uppercase; font-size: 9px; display: block;">Total Reviews</small>
      <span id="statReviews" style="color: #00ff88; font-size: 16px; font-weight: bold;">20,163</span>
    </div>

    <a href="dashboard.html" style="background: #2563eb; color: white; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: bold; text-decoration: none;">DASHBOARD</a>
  </div>

  <!-- 2. Search Bar + Refresh Button (Centered) -->
  <div style="display: flex; justify-content: center; align-items: center; gap: 10px; padding: 5px 20px 10px 20px;">
    <input 
      type="text" 
      id="searchUser" 
      placeholder="🔍 Search by username..." 
      onkeyup="searchReviews()" 
      style="
        width: 40%; /* Half width */
        min-width: 200px;
        padding: 10px; 
        border-radius: 8px; 
        background: #1a1a1a; 
        border: 1px solid #333; 
        color: white; 
        outline: none;
      "
    />
    
    <!-- Refresh Button -->
    <button
        onclick="resetAllFilters()"
        style="
          background: #2d333b;
          border: 1px solid #3d444d;
          color: white;
          width: 38px;
          height: 38px;
          border-radius: 8px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: 0.3s;
        "
        onmouseover="this.style.background='#3d444d'"
        onmouseout="this.style.background='#2d333b'"
      >
        <i class="fas fa-sync-alt"></i>
    </button>
  </div>
</div>
