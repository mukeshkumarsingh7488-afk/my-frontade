<html lang="en">

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔒 SEO OFF (Admin page) -->
    <title>Admin Review Panel | BR30 Trader</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- 🔐 No Cache -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />

    <!-- ✅ Google Fonts -->

      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <style>
      :root {
        --bg: #0a0a0a;
        --card: #141414;
        --primary: #00ffa3;
        --danger: #ff4d4d;
        --text: #ffffff;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: var(--bg);
        color: var(--text);
        padding: 20px;
      }

      h2 {
        text-align: center;
        color: var(--primary);
        margin-bottom: 10px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
      }

      /* Search Box Style */
      .search-container {
        position: sticky;
        top: 0;
        background: var(--bg);
        padding: 15px 0;
        z-index: 100;
      }

      #searchUser {
        width: 100%;
        padding: 12px 20px;
        border-radius: 25px;
        border: 1px solid #333;
        background: #1a1a1a;
        color: white;
        outline: none;
        font-size: 1rem;
      }

      #searchUser:focus {
        border-color: var(--primary);
      }

      .review-card {
        background: var(--card);
        border-left: 4px solid var(--primary);
        padding: 15px;
        margin-bottom: 15px;
        border-radius: 8px;
        transition: 0.3s;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .user-info {
        font-weight: bold;
        font-size: 1.1rem;
      }

      .stars {
        color: #ffd700;
      }

      .comment {
        margin: 10px 0;
        color: #ccc;
      }

      .status-tag {
        font-size: 0.8rem;
        padding: 2px 8px;
        border-radius: 4px;
        font-weight: bold;
      }

      .status-approved {
        background: rgba(0, 255, 163, 0.2);
        color: var(--primary);
      }

      .status-hidden {
        background: rgba(255, 77, 77, 0.2);
        color: var(--danger);
      }

      .actions {
        margin-top: 15px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      button {
        cursor: pointer;
        border: none;
        padding: 8px 18px;
        border-radius: 5px;
        font-weight: bold;
        transition: 0.2s;
      }

      button:hover {
        opacity: 0.8;
      }

      .btn-reply {
        background: #333;
        color: white;
      }

      .btn-hide {
        background: orange;
        color: black;
      }

      .btn-delete {
        background: var(--danger);
        color: white;
      }

      /* Reply Box Animation */
      .reply-box {
        margin-top: 15px;
        display: none;
        padding: 10px;
        background: #1c1c1c;
        border-radius: 8px;
        border: 1px solid #333;
      }

      textarea {
        width: 100%;
        background: #222;
        border: 1px solid #444;
        color: white;
        padding: 10px;
        border-radius: 5px;
        resize: none;
        min-height: 80px;
        box-sizing: border-box;
      }
    </style>
  </head>

  <body onclick="closeAllReplyBoxes(event)">
      <!-- Google Tag Manager (noscript) -->
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L" height="0" width="0"
      style="display:none;visibility:hidden"></iframe></noscript>
  <!-- End Google Tag Manager (noscript) -->

   <div class="container" style="display:flex; justify-content:space-between; align-items:center;">
  
  <h2 style="margin:0;">Review Management Panel</h2>

  <div style="margin-top: 15px;">
  <a href="dashboard.html"
     onmouseover="this.style.background='#1d4ed8'; this.style.transform='scale(1.05)'; this.style.boxShadow='0 6px 15px rgba(0,0,0,0.2)'"
     onmouseout="this.style.background='#2563eb'; this.style.transform='scale(1)'; this.style.boxShadow='none'"
     style="
        display: inline-block;
        background: #2563eb;
        color: white;
        padding: 8px 14px;
        border-radius: 8px;
        font-size: 12px;
        font-weight: bold;
        text-decoration: none;
        transition: all 0.2s ease;
     ">
    BACK TO DASHBOARD
  </a>
</div>

</div>

      <!-- Pro Search Bar -->
      <div class="search-container">
        <input
          type="text"
          id="searchUser"
          placeholder="🔍 Search by username..."
          onkeyup="searchReviews()"
        />
      </div>

      <div id="review-list">
        <!-- Reviews yahan load honge -->
      </div>
    </div>

    <script src="config.js"></script>
    <script>
      const API_BASE = `${window.API_BASE_URL}/api/reviews`;

      let allReviews = []; // Global data for searching

      // 1. Fetch Reviews
      async function fetchReviews() {
        try {
          const res = await fetch(`${API_BASE}/all`);
          if (!res.ok) throw new Error(`HTTP error! status: ${res.status}`);
          allReviews = await res.json();
          renderReviews(allReviews);
        } catch (error) {
          console.error("Error:", error);
          document.getElementById("review-list").innerHTML =
            `<p style='color:red; text-align:center;'>Error: Backend connection failed.</p>`;
        }
      }

      // 2. Render Function
      function renderReviews(data) {
        const list = document.getElementById("review-list");
        list.innerHTML =
          data.length === 0
            ? "<p style='text-align:center;'>No reviews found!</p>"
            : "";

        data.forEach((rev) => {
          const card = document.createElement("div");
          card.className = "review-card";
          const currentStatus = rev.status || "approved";

          card.innerHTML = `
              <div class="header">
                  <div class="user-info">${rev.username} <span class="stars">${"★".repeat(rev.rating)}</span></div>
                  <span class="status-tag ${currentStatus === "approved" ? "status-approved" : "status-hidden"}">${currentStatus.toUpperCase()}</span>
              </div>
              <p class="comment">${rev.comment}</p>
              <div class="admin-reply-text">
                  ${rev.adminReply ? `<span style="color:#00ffa3; font-size:0.9rem"><strong>Admin:</strong> ${rev.adminReply}</span>` : ""}
              </div>

              <div class="actions">
                  <button class="btn-reply" onclick="toggleReplyBox(event, '${rev._id}')">Reply</button>
                  <button class="btn-hide" onclick="toggleStatus('${rev._id}')">${currentStatus === "approved" ? "Hide" : "Show"}</button>
                  <button class="btn-delete" onclick="deleteReview('${rev._id}')">Delete</button>
              </div>

              <div class="reply-box" id="reply-box-${rev._id}" onclick="event.stopPropagation()">
                  <textarea id="input-${rev._id}" placeholder="Apna jawab likho..."></textarea>
                  <button class="btn-reply" style="margin-top:8px; width:100%; background:var(--primary); color:black" onclick="submitReply('${rev._id}')">Send Reply</button>
              </div>
          `;
          list.appendChild(card);
        });
      }

      // 3. Search Logic
      function searchReviews() {
        const searchTerm = document
          .getElementById("searchUser")
          .value.toLowerCase();
        const filtered = allReviews.filter((rev) =>
          rev.username.toLowerCase().includes(searchTerm),
        );
        renderReviews(filtered);
      }

      // 4. Hide/Show Logic (Click Fix)
      async function toggleStatus(id) {
        try {
          const res = await fetch(`${API_BASE}/status/${id}`, {
            method: "PATCH",
          });
          if (res.ok) fetchReviews();
          else alert("Backend route not working!");
        } catch (err) {
          alert("Error connecting to server!");
        }
      }

      // 5. Delete Logic
      async function deleteReview(id) {
        if (confirm("Pakka delete karna hai bhai?")) {
          await fetch(`${API_BASE}/delete/${id}`, { method: "DELETE" });
          fetchReviews();
        }
      }

      // 6. Pro Reply Box Logic (Toggle & Auto-Close)
      function toggleReplyBox(event, id) {
        event.stopPropagation(); // Page click ko rokne ke liye
        const box = document.getElementById(`reply-box-${id}`);
        const isAlreadyOpen = box.style.display === "block";

        closeAllReplyBoxes(); // Pehle baaki sab band karo

        if (!isAlreadyOpen) {
          box.style.display = "block";
        }
      }

      function closeAllReplyBoxes(event) {
        document.querySelectorAll(".reply-box").forEach((box) => {
          box.style.display = "none";
        });
      }

      async function submitReply(id) {
        const replyText = document.getElementById(`input-${id}`).value;
        if (!replyText) return alert("Bhai kuch likho to!");

        try {
          await fetch(`${API_BASE}/update/${id}`, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ adminReply: replyText }),
          });
          alert("Reply Saved! ✅");
          fetchReviews();
        } catch (err) {
          alert("Reply failed!");
        }
      }

      fetchReviews();
    </script>
    <script></script>
  </body>
</html>
