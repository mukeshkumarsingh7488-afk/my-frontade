<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile - BR30TRADER</title>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
    <!-- 2. CDNJS library (Font Awesome icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* =========================================
           1. GLOBAL & BODY STYLES (Dark Theme)
        ========================================= */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #050505;
            /* Aapka Body Color */
            padding: 20px;
        }

        /* =========================================
           2. PROFILE CARD (Responsive)
        ========================================= */
        .profile-card {
            width: 100%;
            max-width: 360px;
            padding: 30px;
            background: #1e293b;
            /* Card Color */
            border: 1px solid #334155;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            color: white;
        }

        /* Profile Pic Section */
        .photo-container {
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .profile-pic {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid #a020f0;
            /* Purple Border */
            object-fit: cover;
            background: #050505;
        }

        .upload-label {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: #a020f0;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            border: 2px solid #1e293b;
            font-size: 14px;
        }

        /* Text & Inputs */
        h2 {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        p#userEmail {
            font-size: 14px;
            color: #94a3b8;
            margin-bottom: 25px;
        }

        .edit-box input {
            width: 100%;
            padding: 12px;
            background: #050505;
            border: 1px solid #334155;
            border-radius: 10px;
            margin-bottom: 15px;
            outline: none;
            color: white;
            text-align: center;
        }

        .edit-box input:focus {
            border-color: #a020f0;
        }

        /* =========================================
           3. BUTTONS & LINKS
        ========================================= */
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
            font-size: 15px;
        }

        /* Primary Purple Buttons */
        #editBtn,
        #saveBtn {
            background: #a020f0;
            color: white;
        }

        /* Logout Button (Outline style) */
        #logoutBtn {
            background: transparent;
            border: 1px solid #f87171;
            color: #f87171;
        }

        button:hover {
            transform: translateY(-2px);
            opacity: 0.9;
        }

        #logoutBtn:hover {
            background: #f87171;
            color: white;
        }

        .back-home {
            text-decoration: none;
            color: #a020f0;
            font-size: 14px;
            font-weight: 500;
            margin-top: 15px;
            display: inline-block;
        }

        /* Mobile Fixes */
        @media (max-width: 480px) {
            .profile-card {
                padding: 25px 20px;
            }
        }
    </style>
</head>

<body>
    <div class="profile-card">
        <!-- User Avatar Section -->
        <div class="photo-container">
            <img id="profilePic" src="" class="profile-pic" alt="Profile"
                onclick="document.getElementById('fileInput').click();" style="cursor: pointer;">
            <label for="fileInput" class="upload-label">📷</label>
            <input type="file" id="fileInput" style="display: none;" accept="image/*">
        </div>

        <h2 id="userName">Loading...</h2>
        <p id="userEmail">Loading...</p>

        <div class="edit-box">
            <input type="text" id="editName" placeholder="Enter New Name" style="display:none;">
        </div>

        <div class="buttons">
            <button id="editBtn">Edit Profile</button>
            <button id="saveBtn" style="display:none;">Save Changes</button>
            <button id="logoutBtn" onclick="logout()">Logout</button>
            <a href="index.html" class="back-home">Back to Home</a>
        </div>
    </div>

      <script src="config.js"></script>
    <script>
        const API_URL = window.API_BASE_URL + '/api/auth';

        // 1. AUTH GUARD & DATA LOAD
        window.onload = async function () {
            const token = localStorage.getItem('token');

            if (!token) {
                alert("Please, Login First!");
                window.location.href = "login.html";
                return;
            }

            try {
                const res = await fetch(window.API_BASE_URL + '/me', {
                    headers: { 'x-auth-token': token }
                });

                if (!res.ok) throw new Error("Session Expired");

                const user = await res.json();

                // UI Update (Backend returns 'user' directly or in 'user' object)
                const name = user.name || (user.user && user.user.name) || "No Name";
                const email = user.email || (user.user && user.user.email) || "No Email";
                const profilePic = user.profilePic || (user.user && user.user.profilePic);

                document.getElementById('userName').innerText = name;
                document.getElementById('userEmail').innerText = email;
                document.getElementById('editName').value = name;

                // UI-Avatar Link Fix
                const picElement = document.getElementById('profilePic');
                picElement.src = profilePic
                    ? window.API_BASE_URL + '/uploads/' + profilePic + '?t=' + Date.now()
                    : 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name) + '&background=a020f0&color=fff&size=128';

            } catch (err) {
                console.error("Profile Load Error:", err);
                localStorage.clear();
                window.location.href = "login.html";
            }
        };

        // 2. PHOTO UPLOAD LOGIC
        document.getElementById('fileInput').addEventListener('change', async function () {
            const file = this.files[0]; // FIX: Specific file index
            if (!file) return;

            const formData = new FormData();
            formData.append('profilePic', file); // Should match backend upload.single("profilePic")

            const token = localStorage.getItem('token');

            try {
                const res = await fetch(window.API_BASE_URL + '/update-profile', {
                    method: 'PUT',
                    headers: { 'x-auth-token': token },
                    body: formData
                });

                const data = await res.json();
                if (res.ok) {
                    // Backend returns updatedUser directly
                    const newPic = data.profilePic || (data.user && data.user.profilePic);
                    document.getElementById('profilePic').src = window.API_BASE_URL + '/uploads/' + newPic + '?t=' + Date.now();
                    alert("Photo Updated! 🚀");
                } else {
                    alert(data.msg || "Upload failed!");
                }
            } catch (err) { alert("Server connection error!"); }
        });

        // 3. EDIT UI TOGGLE
        document.getElementById('editBtn').addEventListener('click', () => {
            document.getElementById('userName').style.display = 'none';
            document.getElementById('editName').style.display = 'block';
            document.getElementById('editBtn').style.display = 'none';
            document.getElementById('saveBtn').style.display = 'inline-block';
            document.getElementById('editName').focus();
        });

        // ENTER KEY Support
        document.getElementById('editName').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                document.getElementById('saveBtn').click();
            }
        });

        // 4. NAME SAVE LOGIC
        document.getElementById('saveBtn').addEventListener('click', async () => {
            const newName = document.getElementById('editName').value.trim();
            const token = localStorage.getItem('token');

            if (!newName) return alert("Name cannot be empty!");

            try {
                const res = await fetch(window.API_BASE_URL + '/update-profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-auth-token': token
                    },
                    body: JSON.stringify({ name: newName })
                });

                const data = await res.json();
                if (res.ok) {
                    document.getElementById('userName').innerText = data.name || newName;
                    // UI Reset
                    document.getElementById('userName').style.display = 'block';
                    document.getElementById('editName').style.display = 'none';
                    document.getElementById('editBtn').style.display = 'inline-block';
                    document.getElementById('saveBtn').style.display = 'none';
                    alert("Name Updated! ✅");
                } else {
                    alert("Update failed!");
                }
            } catch (err) { console.error("Update Error:", err); }
        });

        function logout() {
            if (confirm(" Conform Logout ?")) {
                localStorage.clear();
                window.location.href = "login.html";
            }
        }
    </script>
</body>

</html>
