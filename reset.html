    <div class="container">
        <h2 class="login-heading">Reset Password</h2>

        <!-- Browser signal ke liye FORM tag zaroori hai -->
        <form id="resetForm" onsubmit="resetPassword(event)">

            <label>Registered Email</label>
            <div class="input-box">
                <!-- name="email" aur autocomplete="username" Google ko hint deta hai -->
                <input id="email" name="email" type="email" placeholder="example@mail.com" autocomplete="username"
                    required>
            </div>

            <label>Reset OTP/Token</label>
            <div class="input-box">
                <input id="token" name="token" type="text" placeholder="Enter 6-digit OTP" required>
            </div>

            <label>New Password</label>
            <div class="input-box">
                <!-- autocomplete="new-password" se 'Save/Update Password' ka prompt aata hai -->
                <input id="newPassword" name="password" type="password" placeholder="8+ chars, 1 Special"
                    autocomplete="new-password" required>
            </div>

            <!-- Button type submit hona chahiye -->
            <button type="submit" id="resetBtn">Update Password</button>
        </form>

        <div class="links">
            <a href="login.html">Back to Login</a>
        </div>
    </div>

    <script src="config.js"></script>
    <script>
        // event parameter add kiya taaki refresh roke aur browser signal capture kare
        async function resetPassword(event) {
            if (event) event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const token = document.getElementById("token").value.trim();
            const newPassword = document.getElementById("newPassword").value;
            const btn = document.getElementById("resetBtn");

            // Basic Validation
            if (!email || !token || !newPassword) {
                alert("Bhai, please enter all details!");
                return;
            }

            // Strength Check
            const passRegex = /^(?=.*[0-9])(?=.*[!@#$%^&*])[a-zA-Z0-9!@#$%^&*]{8,}$/;
            if (!passRegex.test(newPassword)) {
                return alert("Password weak hai! Use 8+ chars & Special Character.");
            }

            btn.innerText = "Updating...";
            btn.disabled = true;

            try {
                const res = await fetch(window.API_BASE_URL + '/api/auth/reset-password', {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ email, token, newPassword }),
                });

                const data = await res.json();

                if (res.ok) {
                    alert("Password updated successfully! 🚀");
                    // 1 second ka gap taaki browser password save karne ka popup dikha sake
                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1000);
                } else {
                    alert(data.msg || data.message || "Invalid OTP or Email!");
                    btn.innerText = "Update Password";
                    btn.disabled = false;
                }
            } catch (err) {
                alert("Server Connection Error!");
                btn.innerText = "Update Password";
                btn.disabled = false;
            }
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('resetBtn').click();
            }
        });
    </script>
