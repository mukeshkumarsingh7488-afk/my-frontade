<!DOCTYPE html>
<html lang="hi">
    <!-- Meta Tags -->
  <head>
    <!-- Meta Tags -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Option Chain - BR30TRADER</title>
    <meta name="description" content="Real-time Pro Option Chain for BR30TRADER with live data, IV, Greeks, and breakout levels.">
    <meta name="author" content="BR30TRADER">

    <!-- Content Security Policy (CSP) -->
    <!-- ✅ Removed inline-blocking for scripts (unsafe-inline added for inline JS) -->
    <meta http-equiv="Content-Security-Policy"
          content="
            default-src 'self';
            script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://www.googletagmanager.com https://www.google-analytics.com;
            style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com;
            font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com;
            img-src 'self' https://assets.upstox.com https://upstox.com https://px.ads.linkedin.com https://www.google.co.in https://www.google.com https://www.facebook.com https://t.co https://analytics.twitter.com https://bat.bing.com https://adservice.google.com https://www.googletagmanager.com https://ad.doubleclick.net;
            connect-src 'self' https://api.upstox.com https://my-backend-1-avpd.onrender.com;
            frame-src 'self';
          ">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto+Mono:wght@400;700&family=Roboto:wght@400;700&display=swap" rel="stylesheet">

    <!-- FontAwesome Free (Icons) -->
    <!-- ✅ Removed integrity attribute to fix console hash error -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- Favicon -->
    <!-- ✅ Update path according to your project -->
    <link rel="icon" type="image/png" href="/assets/images/favicon.png">
    <style>
        :root {
            --bg: #0b0e11;
            --card: #1e2329;
            --border: #2b3139;
            --text: #eaecef;
            --call: #02c076;
            --put: #f84960;
            --strike: #f0b90b;
            --scrollbar: #2b3139;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Roboto', sans-serif;
            margin: 0;
            padding: 20px;
        }

        .header-strip {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--card);
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
        }

        .spot-box {
            font-size: 20px;
            font-weight: bold;
            color: var(--strike);
            font-family: 'Roboto Mono', monospace;
        }

        select {
            background: #2b3139;
            color: white;
            border: 1px solid var(--border);
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
        }

        .login-btn {
            background: var(--strike);
            color: #000;
            font-weight: bold;
            border: none;
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: 0.3s;
            font-size: 14px;
            text-decoration: none;
        }

        .dot {
            height: 8px;
            width: 8px;
            background-color: #02c076;
            border-radius: 50%;
            display: inline-block;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        .oc-container {
            overflow: auto;
            border: 1px solid var(--border);
            border-radius: 8px;
            background: var(--card);
            max-height: 80vh;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 1400px;
        }

        th,
        td {
            padding: 8px;
            text-align: center;
            font-family: 'Roboto Mono', monospace;
            font-size: 12px;
            border-bottom: 1px solid var(--border);
        }

        th {
            position: sticky;
            top: 0;
            background: #161a1e;
            z-index: 10;
        }

        .strike-price {
            background: #161a1e !important;
            font-weight: bold;
            color: var(--strike);
            position: sticky;
            left: 0;
            z-index: 5;
            border-left: 2px solid var(--strike);
            border-right: 2px solid var(--strike);
        }

        .itm-bg {
            background: rgba(255, 255, 255, 0.03);
        }

        /* ITM Shading */
        .call-ltp {
            color: var(--call);
            font-weight: bold;
        }

        .put-ltp {
            color: var(--put);
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="header-strip">
        <div>
            <select id="indexSelect" onchange="fetchOptionChain()">
                <option value="NIFTY">NIFTY 50</option>
                <option value="BANKNIFTY">BANK NIFTY</option>
            </select>
        </div>
        <div class="spot-box" id="spotDisplay">Spot: --</div>
        <a href="https://my-backend-1-avpd.onrender.com/api/upstox/login" target="_blank" class="login-btn">
            <i class="fas fa-key"></i> Connect Upstox <span class="dot"></span>
        </a>
    </div>

    <div class="oc-container">
        <table>
            <thead>
                <tr style="background: #161a1e;">
                    <th colspan="7" style="color:var(--call)">CALLS</th>
                    <th class="strike-price">STRIKE</th>
                    <th colspan="7" style="color:var(--put)">PUTS</th>
                </tr>
                <tr style="background: #1e2329;">
                    <th>Volume</th>
                    <th>OI</th>
                    <th>OI(chg)</th>
                    <th>IV</th>
                    <th>Vega</th>
                    <th>Gamma</th>
                    <th>Theta</th>
                    <th>Delta</th>
                    <th>LTP</th>
                    <th>LTP</th>
                    <th>Delta</th>
                    <th>Theta</th>
                    <th>Gamma</th>
                    <th>Vega</th>
                    <th>IV</th>
                    <th>OI(chg)</th>
                    <th>OI</th>
                    <th>Volume</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <script>
        const API_BASE = "https://my-backend-1-avpd.onrender.com";

        async function fetchOptionChain() {
            const index = document.getElementById('indexSelect').value;
            const tableBody = document.getElementById('tableBody');

            try {
                const response = await fetch(`${API_BASE}/api/upstox/option-chain/${index}`);
                const resData = await response.json();

                if (!resData.success) {
                    if (response.status === 401) alert("Please Login to Upstox first!");
                    return;
                }

                document.getElementById('spotDisplay').innerText = `Spot: ${resData.spotPrice}`;
                const spot = resData.spotPrice;

                tableBody.innerHTML = resData.data.map(row => {
                    // ITM Logic: Call ITM agar Strike < Spot, Put ITM agar Strike > Spot
                    const callITM = row.strike_price < spot ? 'itm-bg' : '';
                    const putITM = row.strike_price > spot ? 'itm-bg' : '';

                    return `
                        <tr>
                                    <td class="${callITM}">${row.call.volume || 0}</td>
            <td class="${callITM}">${(row.call.oi / 1000).toFixed(1)}k</td>
            <td class="${callITM}">${row.call.oi_chg || 0}</td>
            <td class="${callITM}">${row.call.iv || 0}</td>
            <td class="${callITM}">${row.call.vega || 0}</td>
            <td class="${callITM}">${row.call.gamma || 0}</td>
            <td class="${callITM}">${row.call.theta || 0}</td>
            <td class="${callITM}">${row.call.delta || 0}</td>
            <td class="call-ltp ${callITM}">${row.call.ltp.toFixed(2)}</td>

            <td class="strike-price">${row.strike_price}</td>

            <td class="put-ltp ${putITM}">${row.put.ltp.toFixed(2)}</td>
            <td class="${putITM}">${row.put.delta || 0}</td>
            <td class="${putITM}">${row.put.theta || 0}</td>
            <td class="${putITM}">${row.put.gamma || 0}</td>
            <td class="${putITM}">${row.put.vega || 0}</td>
            <td class="${putITM}">${row.put.iv || 0}</td>
            <td class="${putITM}">${row.put.oi_chg || 0}</td>
            <td class="${putITM}">${(row.put.oi / 1000).toFixed(1)}k</td>
            <td class="${putITM}">${row.put.volume || 0}</td>
                        </tr>
                    `;
                }).join('');

            } catch (err) {
                console.error("Fetch Error:", err);
            }
        }

        // Har 5 second mein auto-refresh
        setInterval(fetchOptionChain, 5000);
        fetchOptionChain();
    </script>
</body>

</html>
