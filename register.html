<!doctype html>
<html lang="en">
  <head>

        f.parentNode.insertBefore(j, f);

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO (controlled) -->
    <title>Register | BR30 Trader</title>
    <meta
      name="description"
      content="Create your BR30 Trader account and start learning professional trading strategies with OTP verification."
    />
    <meta name="robots" content="noindex, nofollow" />

    <!-- 🔒 Security -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Poppins:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
    <style>
      /* =========================================
           GLOBAL & BACKGROUND STYLES
        ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        /* Aapka Body Color */
        padding: 20px;
      }

      /* =========================================
           REGISTRATION CONTAINER (Responsive)
        ========================================= */
      .container {
        width: 100%;
        max-width: 380px;
        background: #1e293b;
        /* Dark Card Color */
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #ffffff;
        /* White Text */
        font-weight: 600;
      }

      label {
        font-size: 13px;
        font-weight: 500;
        color: #cbd5e1;
        margin-bottom: 6px;
        display: block;
      }

      /* Input Box Styling */
      .input-box {
        display: flex;
        align-items: center;
        background: #050505;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 5px 12px;
        margin-bottom: 15px;
        position: relative;
        transition: 0.3s;
      }

      .input-box:focus-within {
        border-color: #a020f0;
        /* Purple Focus */
      }

      .input-box input {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        flex: 1;
        padding: 10px 5px;
        font-size: 15px;
      }

      /* Toggle Password Button */
      .toggle-btn {
        cursor: pointer;
        color: #94a3b8;
        font-size: 18px;
      }

      /* Button Styling */
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #a020f0;
        /* Brand Purple */
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
        font-weight: 600;
        margin-top: 10px;
      }

      button:hover {
        background: #8219c4;
        transform: translateY(-2px);
      }

      /* Footer Links */
      .links {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .links a {
        text-decoration: none;
        color: #a020f0;
        /* Purple Link */
        font-size: 14px;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* Mobile Adjustment */
      @media (max-width: 480px) {
        .container {
          padding: 20px;
        }

        h2 {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript></noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
      <h2 class="register-heading">Register</h2>

      <!-- SECTION 1: REGISTRATION (Wrapped in FORM for Password Saving) -->
      <form id="register-section" onsubmit="handleRegister(event)">
        <label>Full Name</label>
        <div class="input-box">
          <input
            id="username"
            name="username"
            placeholder="Only letters allowed"
            required
            oninput="this.value = this.value.replace(/[^a-zA-Z\s]/g, '')"
          />
        </div>

        <label>Email Address</label>
        <div class="input-box">
          <input
            id="email"
            name="email"
            type="email"
            placeholder="example@mail.com"
            autocomplete="email"
            required
          />
        </div>

        <label>Password</label>
        <div class="input-box">
          <!-- autocomplete="new-password" se Google prompt trigger hota hai -->
          <input
            id="password"
            name="password"
            type="password"
            placeholder="8+ chars, 1 Special (@#$%^&*)"
            autocomplete="new-password"
            required
          />
          <span
            class="toggle-btn"
            id="toggleBtn"
            onclick="togglePassword()"
            style="cursor: pointer"
          >
            👁️
          </span>
        </div>

        <button type="submit" id="regBtn">Send OTP</button>
      </form>

      <!-- SECTION 2: OTP VERIFICATION (Wrapped in FORM) -->
      <form
        id="otp-section"
        style="display: none"
        onsubmit="handleVerify(event)"
      >
        <p
          style="
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
          "
        >
          Verification code sent to email.
        </p>
        <label>Enter 6-Digit OTP</label>
        <div class="input-box">
          <input
            id="otpInput"
            type="number"
            placeholder="Ex: 123456"
            required
          />
        </div>
        <button type="submit" id="verifyBtn">Verify & Register</button>

        <!-- Timer & Resend -->
        <div style="text-align: center; margin-top: 15px">
          <p id="timerText" style="font-size: 12px; color: #94a3b8">
            Resend in
            <span id="timer">30</span>
            s
          </p>
          <button
            type="button"
            id="resendBtn"
            onclick="resendOTP()"
            style="
              display: none;
              background: none;
              color: #3b82f6;
              border: none;
              cursor: pointer;
              text-decoration: underline;
              font-size: 13px;
            "
          >
            Resend OTP
          </button>
        </div>
      </form>

      <div class="links">
        <a
          href="login.html"
          onclick="
            window.location.href = 'login.html';
            return false;
          "
          style="cursor: pointer; display: inline-block; padding: 10px"
        >
          Already have an account? Login
        </a>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/register.js"></script>
    <script src="js/security.js"></script>
  </body>
</html>
