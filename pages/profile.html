<!doctype html>
<html lang="en">
  <head>

          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;

      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");
    </script>

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title -->
    <title>My Profile | BR30 Trader</title>

    <!-- 🔒 Hide from Google -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- ❌ No Cache (user data protection) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/profile.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="profile-card">
      <!-- User Avatar Section -->
      <div class="photo-container">
        <img
          id="profilePic"
          src=""
          class="profile-pic"
          alt="Profile"
          onclick="document.getElementById('fileInput').click()"
          style="cursor: pointer"
        />
        <label for="fileInput" class="upload-label">📷</label>
        <input
          type="file"
          id="fileInput"
          style="display: none"
          accept="image/*"
        />
      </div>
      <div id="vipBadgeContainer"></div>
      <h2 id="userName">Loading...</h2>
      <p id="userEmail">Loading...</p>

      <div class="edit-box">
        <input
          type="text"
          id="editName"
          placeholder="Enter New Name"
          style="display: none"
        />
      </div>

      <div class="buttons">
        <button id="editBtn">Edit Profile</button>
        <button id="saveBtn" style="display: none">Save Changes</button>
        <button id="logoutBtn" onclick="logout()">Logout</button>
        <a href="../index.html" class="back-home">Back to Home</a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="../js/security.js"></script>
    <script src="../js/profile.js"></script>
  </body>
</html>
