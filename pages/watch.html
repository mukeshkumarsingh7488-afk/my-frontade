<!doctype html>
<html lang="en">
  <head>

      (function (w, d, s, l, i) {

          j = d.createElement(s),
          dl = l != "dataLayer" ? "&l=" + l : "";
        j.async = true;
        j.src = "https://www.googletagmanager.com/gtm.js?id=GTM-TT7SLZ4L" + dl;
        f.parentNode.insertBefore(j, f);
      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");
    </script>

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- 🔒 SEO OFF (Private page) -->
    <title>Watch Course | BR30 Trader</title>
    <meta name="robots" content="noindex, nofollow" />

    <!-- 🔐 Security -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="stylesheet" href="../assets/css/watch.css" />
    <!-- ✅ SweetAlert2 -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <header>
      <h1 id="course-title">Course Title</h1>
      <nav><a href="mycourse.html">← Back to Courses</a></nav>
    </header>

    <div class="watch-container">
      <!-- Video Player Section -->
      <div class="video-player">
        <div class="iframe-container">
          <!-- 🔥 YouTube API yahan player inject karega -->
          <!-- 🎥 SIRF YE RAKHO (Iframe ko bilkul hata do) -->
          <div
            id="main-video-iframe"
            style="
              width: 100%;
              aspect-ratio: 16/9;
              background: #000;
              border-radius: 15px;
            "
          ></div>
        </div>
        <h2 id="current-video-title">Select a Video</h2>
      </div>

      <!-- Playlist Sidebar -->
      <div class="video-list">
        <h3>Course Content</h3>
        <div id="playlist">
          <p style="font-size: 13px; color: #94a3b8">Loading playlist...</p>
        </div>
      </div>
    </div>

    <!-- 🏆 CERTIFICATE POPUP -->
    <div id="cert-overlay">
      <div class="cert-card">
        <h2 style="color: #00ff88; margin-bottom: 10px">🏆 Congratulations!</h2>
        <p style="color: #94a3b8; font-size: 14px">
          Bhai, aapne course complete kar liya! Certificate ke liye apni details
          bharein:
        </p>

        <input
          type="text"
          id="certName"
          class="cert-input"
          placeholder="Aapka Full Name"
        />
        <input
          type="text"
          id="certMobile"
          class="cert-input"
          placeholder="Mobile Number"
        />

        <button class="claim-btn" onclick="submitCertificate()">
          Claim Certificate 🚀
        </button>
        <p
          onclick="
            document.getElementById('cert-overlay').style.display = 'none'
          "
          style="
            color: #ff4d4d;
            cursor: pointer;
            margin-top: 15px;
            font-size: 12px;
          "
        >
          Maybe Later
        </p>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script src="../js/security.js"></script>
    <script src="../js/watch.js"></script>
  </body>
</html>
