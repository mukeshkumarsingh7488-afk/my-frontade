<!doctype html>
<html lang="hi">
  <head>

          dl = l != "dataLayer" ? "&l=" + l : "";

      })(window, document, "script", "dataLayer", "GTM-TT7SLZ4L");

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title -->
    <title>Bulk Email Panel | BR30 Trader</title>

    <!-- 🔒 Hide from Google -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- ❌ No Cache -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../assets/css/email.css" />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <!-- ✅ Axios -->
    <script
      src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"
      defer
    ></script>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->

    <div class="email-card">
      <h2>Admin Bulk Email 📧</h2>

      <div class="form-group">
        <label>Subject</label>
        <input
          type="text"
          id="email-subject"
          placeholder="Eg: Live Market Update 🚀"
        />
      </div>

      <div class="form-group">
        <label>Aapka Message</label>
        <textarea
          id="email-message"
          placeholder="Sabhi users ko kya bhejba hai? (Ye HTML template ke andar jayega)"
        ></textarea>
      </div>

      <button id="send-bulk-btn">Sabko Mail Bhejo</button>
      <div id="status-msg"></div>

      <div style="margin-top: 15px">
        <a
          href="admin-dashboard.html"
          onmouseover="
            this.style.background = '#1d4ed8';
            this.style.transform = 'scale(1.05)';
            this.style.boxShadow = '0 6px 15px rgba(0,0,0,0.2)';
          "
          onmouseout="
            this.style.background = '#2563eb';
            this.style.transform = 'scale(1)';
            this.style.boxShadow = 'none';
          "
          style="
            display: inline-block;
            background: #2563eb;
            color: white;
            padding: 8px 14px;
            border-radius: 8px;
            font-size: 12px;
            font-weight: bold;
            text-decoration: none;
            transition: all 0.2s ease;
          "
        >
          BACK TO DASHBOARD
        </a>
      </div>
    </div>

    <script src="../js/config.js"></script>
    <!-- Dashboard Logic (Type Module) -->
    <script type="module" src="../js/email.js"></script>
    <script src="../js/security.js"></script>
  </body>
</html>
