<!-- 1. Sticky Wrapper (Top Gap और Side Movement Fix) -->
<!-- 1. Sticky Wrapper (Top Space 0 करने के लिए) -->
<div style="
    position: sticky; 
    top: 0; 
    z-index: 1000; 
    background: #000; 
    width: 100%; 
    margin: 0; 
    padding: 10px 0; 
    border-bottom: 2px solid #222; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.6);
">
  
  <!-- Main Header Container -->
  <div style="display:flex; justify-content:space-between; align-items:center; padding: 10px 20px;">
    <h2 style="margin:0; font-size: 18px; color: #00ff88; white-space: nowrap;">Review Management Panel</h2>

    <div style="background: #1a1a1a; padding: 5px 12px; border-radius: 6px; border-left: 3px solid #00ff88; min-width: 100px; text-align: center;">
      <small style="color: #888; text-transform: uppercase; font-size: 9px; display: block;">Total Reviews</small>
      <span id="statReviews" style="color: #00ff88; font-size: 16px; font-weight: bold;">0</span>
    </div>

    <a href="admin-dashboard.html" style="background: #2563eb; color: white; padding: 6px 14px; border-radius: 6px; font-size: 11px; font-weight: bold; text-decoration: none;">DASHBOARD</a>
  </div>

  <!-- 2. Search Bar + Refresh Button (Centered) -->
  <div style="display: flex; justify-content: center; align-items: center; gap: 10px; padding: 5px 20px 10px 20px;">
    <input 
      type="text" 
      id="searchUser" 
      placeholder="🔍 Search by username..." 
      onkeyup="searchReviews()" 
      style="
        width: 40%; /* Half width */
        min-width: 200px;
        padding: 10px; 
        border-radius: 8px; 
        background: #1a1a1a; 
        border: 1px solid #333; 
        color: white; 
        outline: none;
      "
    />
    
    <!-- Refresh Button -->
    <button
        onclick="resetAllFilters()"
        style="
          background: #2d333b;
          border: 1px solid #3d444d;
          color: white;
          width: 38px;
          height: 38px;
          border-radius: 8px;
          cursor: pointer;
          display: flex;
          align-items: center;
          justify-content: center;
          transition: 0.3s;
        "
        onmouseover="this.style.background='#3d444d'"
        onmouseout="this.style.background='#2d333b'"
      >
        <i class="fas fa-sync-alt"></i>
    </button>
  </div>
</div>
