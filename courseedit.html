    <style>
      body {
        background: #050505;
        color: white;
        font-family: "Poppins", sans-serif;
        padding: 20px;
      }

      .container {
        max-width: 1100px;
        margin: auto;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
        border-left: 5px solid #a020f0;
        padding-left: 15px;
      }

      .back-btn {
        background: #1a1a1a;
        color: #a020f0;
        border: 1px solid #a020f0;
        padding: 10px 20px;
        border-radius: 8px;
        text-decoration: none;
        font-weight: bold;
        transition: 0.3s;
      }

      .back-btn:hover {
        background: #a020f0;
        color: white;
      }

      /* 📱 Grid Layout: Desktop 3, Mobile 1 */
      .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
        gap: 25px;
      }

      .course-card {
        background: #0a0a0a;
        border: 1px solid #1e293b;
        border-radius: 20px;
        padding: 15px;
        transition: 0.3s;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
      }

      .course-card:hover {
        transform: translateY(-5px);
        border-color: #a020f0;
      }

      .course-card img {
        width: 100%;
        height: 180px;
        border-radius: 12px;
        object-fit: cover;
        margin-bottom: 15px;
      }

      .course-card h3 {
        margin: 0 0 10px 0;
        font-size: 18px;
        color: #fff;
      }

      .course-card .price {
        font-size: 22px;
        font-weight: 800;
        color: #00ff88;
        margin-bottom: 20px;
      }

      .actions {
        display: flex;
        gap: 10px;
      }

      .edit-btn {
        flex: 2;
        background: #a020f0;
        color: white;
        border: none;
        padding: 12px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: bold;
        font-size: 12px;
        text-transform: uppercase;
      }

      .del-btn {
        flex: 1;
        background: #ef4444;
        color: white;
        border: none;
        border-radius: 10px;
        cursor: pointer;
      }

      #course-grid {
        opacity: 0;
        transition: opacity 0.4s ease-in-out;
      }
    </style>
  </head>

    <div class="container">
      <div class="header">
        <div>
          <h1>Course Management</h1>
          <p style="color: #64748b; margin-top: -10px">
            Update Prices & Details Instantly
          </p>
        </div>
        <a href="dashboard.html" class="back-btn">
          <i class="fas fa-arrow-left"></i>
          Back to Dashboard
        </a>
      </div>

      <div id="course-grid" class="course-grid">
        <!-- JavaScript se data yahan aayega -->
        <p style="text-align: center; color: #a020f0; width: 100%">
          🔄 Syncing with BR30 Database...
        </p>
      </div>
    </div>
    <script src="config.js"></script>
     <script src="js/config.js"></script>
      <script src="js/security.js"></script>
         <script src="js/courseedit.js"></script>
  </body>
</html>
