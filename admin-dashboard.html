      .side-btn.active {

      :root {
        --bg-dark: #000000; /* Admin Panel jaisa pitch black */
        --card-bg: #111111; /* Dark Grey Cards */
        --border-clr: #333333;
        --accent-clr: #00ffcc;

      body {
        margin: 0;

        background-color: var(--bg-dark);
        color: white;
        display: flex;
        min-height: 100vh;
      }

      /* --- SIDEBAR STYLE --- */
      .sidebar {
        width: 250px;
        background: #050505;
        border-right: 1px solid var(--border-clr);
        display: flex;
        flex-direction: column;
        padding: 20px;
        position: fixed;
        height: 100vh;
      }

        color: #00ffcc;
        font-size: 22px;
        font-weight: bold;
        margin-bottom: 40px;
        letter-spacing: 1px;
      }

      .side-btn {
        background: transparent;
        color: #bbb;
        border: none;
        padding: 12px 15px;
        text-align: left;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
        display: flex;
        align-items: center;
        gap: 12px;
        margin-bottom: 5px;
      }

      .side-btn:hover,
      .side-btn.active {
        background: #111;
        color: #00ffcc;
        border-left: 3px solid #00ffcc;
      }

      /* --- MAIN CONTENT --- */
      .main-content {
        flex: 1;
        margin-left: 280px;
        padding: 30px;
      }

      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
      }

      /* --- BRIGHT CALENDER & FILTERS --- */
      .filter-section {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .bright-date {
        background: #111 !important;
        border: 1px solid #444 !important;
        color: #00ffcc !important; /* Calender text chamkila */
        padding: 8px 12px;
        border-radius: 6px;
        outline: none;
        font-size: 13px;
        font-weight: bold;
        cursor: pointer;
      }

      /* Calender Icon ko white karne ke liye */
      input[type="date"]::-webkit-calendar-picker-indicator {
        filter: invert(1);
        cursor: pointer;
      }

      .btn-action {
        padding: 8px 16px;
        border-radius: 6px;
        cursor: pointer;
        font-weight: bold;
        border: none;
        font-size: 13px;
        transition: 0.3s;
      }

      .update-btn {
        background: #007bff;
        color: white;

        background: #0056b3;
      }

      .reset-btn {
        background: #333;
        color: white;
        padding: 8px 12px;
      }
      .reset-btn:hover {
        background: #444;
      }

      /* CSV Button - Excel Report */
      .csv-btn {
        background: #10b981;
        color: white;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .csv-btn:hover {
        background: #059669;
      }

      .pdf-btn {

        color: white;
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .pdf-btn:hover {
        background: #dc2626;
      }

      /* --- STATS CARDS --- */
      .stats-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 20px;
        margin-bottom: 30px;
      }

      .stat-card {
        background: var(--card-bg);
        padding: 20px;
        border-radius: 8px;
        border: 1px solid #222;
      }

      .stat-card h3 {
        margin: 0;
        font-size: 11px;
        color: #777;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .stat-card p {
        margin: 12px 0 0;
        font-size: 22px;
        font-weight: bold;
      }

      /* Border colors like Admin Dashboard */
      .blue p {
        color: #007bff;
      }
      .green p {
        color: #10b981;
      }
      .yellow p {
        color: #ffca28;
      }
      .red p {
        color: #ff4d4d;
      }

      /* --- TABLE --- */
      .table-container {
        max-height: 400px;
        overflow-y: auto;
        border: 1px solid #333;
        background: var(--card-bg);
        border-radius: 8px;
        border: 1px solid #222;
        overflow: hidden;
        padding-right: 5px;
      }

      /* स्क्रॉलबार को सुंदर बनाने के लिए (Optional) */
      .table-container::-webkit-scrollbar {
        width: 8px;
      }
      .table-container::-webkit-scrollbar-thumb {
        background: #444;
        border-radius: 10px;
      }
      table {
        width: 100%;
        border-collapse: collapse;
      }

      th {
        text-align: left;
        color: #555;
        font-size: 11px;
        padding: 15px;
        background: #0a0a0a;
        border-bottom: 1px solid #222;
        text-transform: uppercase;
      }

      td {
        padding: 15px;
        border-bottom: 1px solid #1a1a1a;
        font-size: 13px;
        color: #ccc;
      }

      tr:hover {
        background: #151515;
      }

      .status-badge {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 10px;
        font-weight: bold;
        text-transform: uppercase;
      }

      .paid {
        background: rgba(16, 185, 129, 0.15);
        color: #10b981;
      }
      .pending {
        background: rgba(255, 202, 40, 0.15);
        color: #ffca28;
      }

<!-- ✉️ Marketing & Coupon Management -->
<div class="marketing-card">
    <h4><i class="fas fa-bullhorn"></i> BULK MARKETING</h4>

    <select id="mail-target" class="marketing-input">
        <option value="all">Target: All Users</option>
        <option value="vip">Target: VIP Only</option>
        <option value="normal">Target: Normal Only</option>
    </select>

    <input type="text" id="mail-subject" placeholder="Offer Subject (e.g. 30% OFF)" class="marketing-input">

    <textarea id="mail-body" placeholder="Message... (HTML Allowed)" class="marketing-input text-area"></textarea>

    <button onclick="sendBulkMail()" id="send-btn" class="blast-btn">
        🚀 Send Blast Now
    </button>

        <button onclick="cancelActiveCoupon()" id="cancel-btn">

    </div>

   <script src="config.js"></script>
    <script>
        // 0. 🛡️ Admin Security Check (Sirf aapke liye)
        document.addEventListener("DOMContentLoaded", () => {
            const role = localStorage.getItem("role");
            const token = localStorage.getItem("token");
            const username = localStorage.getItem("username") || "Admin";

            if (!token || role !== "admin") {
                alert("Bhai, ye sirf Admin ke liye hai!");
                window.location.href = "login.html"; // Wapas bhej do agar admin nahi hai
            } else {
                document.getElementById("user").innerText = "Welcome, " + username;
                loadStats(); // Agar admin hai toh stats load karo
            }
        });

        // 1. 📊 Stats Load Karne Ka Logic
        async function loadStats() {
            try {
                const token = localStorage.getItem("token"); // LocalStorage se token nikalo

                if (!token) {
                    console.error("Bhai, token hi nahi mila!");
                    return;
                }

              const res = await fetch(`${window.API_BASE_URL}/api/auth/user-stats`, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${token}` // 🔥 'Bearer ' ke baad space zaruri hai
                    }
                });

                const data = await res.json();

                if (data.success) {
                    document.getElementById("total-count").innerText = data.totalUsers;
                    document.getElementById("vip-count").innerText = data.vipCount;
                    document.getElementById("normal-count").innerText = data.normalCount;
                } else {
                    console.error("Server se error aaya:", data.msg);
                }
            } catch (e) {
                console.error("Stats fetch karne mein locha:", e.message);
            }
        }


        // 2. ✉️ Bulk Mail Bhejne Ka Logic (BCC Target System)
        async function sendBulkMail() {
            const btn = document.getElementById("send-btn");
            const target = document.getElementById("mail-target").value;
            const subject = document.getElementById("mail-subject").value;
            const htmlContent = document.getElementById("mail-body").value;

            if (!subject || !htmlContent) return alert("Bhai, Subject aur Message likhna zaroori hai!");

            btn.innerText = "Mails Bheji Ja Rahi Hain...";
            btn.disabled = true;

            try {
               const res = await fetch(`${window.API_BASE_URL}/api/auth/send-offers`, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": `Bearer ${localStorage.getItem("token")}`
                    },
                    // Backend controller ko target (all/vip/normal) bhej rahe hain
                    body: JSON.stringify({ target, subject, htmlContent })
                });

                const data = await res.json();

                if (res.ok) {
                    alert("🚀 " + data.message);
                    // Clear fields after success
                    document.getElementById("mail-subject").value = "";
                    document.getElementById("mail-body").value = "";
                } else {
                    alert("Galti: " + data.message);
                }
            } catch (err) {
                alert("Server connection locha! Backend ON hai?");
            } finally {
                btn.innerText = "🚀 Send Blast Now";
                btn.disabled = false;
            }
        }

        // Logout function
        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        async function cancelActiveCoupon() {
            // 1. Confirm karo pehle
            if (!confirm("Bhai, kya aap sach mein current discount offer ko band karna chahte ho?")) return;

            const btn = document.getElementById("cancel-btn");
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
               const res = await fetch(`${window.API_BASE_URL}/api/auth/cancel-coupon`, {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${localStorage.getItem("token")}`,
                        "Content-Type": "application/json"
                    }
                });

                const data = await res.json();

                if (data.success) {
                    alert("✅ " + data.msg);
                    location.reload(); // Page refresh karo stats update karne ke liye
                } else {
                    alert("❌ Galti: " + data.msg);
                }
            } catch (err) {
                alert("Server connection mein locha hai!");
            } finally {
                btn.innerText = "🚫 Cancel Current Coupon";
                btn.disabled = false;
            }
        }

    </script>
