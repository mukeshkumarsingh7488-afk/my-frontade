<!doctype html>
<html lang="en">
  <head>

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title -->
    <title>Login | BR30 Trader</title>

    <!-- 🔒 Hide from Google -->
    <meta name="robots" content="noindex, nofollow" />

    <!-- ❌ No Cache (security) -->
    <meta
      http-equiv="Cache-Control"
      content="no-store, no-cache, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <style>
      /* =========================================
           GLOBAL & BACKGROUND STYLES
        ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        /* Body Color */
        padding: 20px;
      }

      /* =========================================
           LOGIN CONTAINER (Responsive)
        ========================================= */
      .container {
        width: 100%;
        max-width: 360px;
        background: #1e293b;
        /* Dark Card Color */
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      .container h2 {
        text-align: center;
        margin-bottom: 25px;
        color: #ffffff;
        /* White Text */
        font-weight: 600;
      }

      /* Input Fields */
      label {
        font-size: 14px;
        color: #cbd5e1;
        font-weight: 500;
        display: block;
        margin-bottom: 8px;
      }

      .input-box {
        display: flex;
        align-items: center;
        background: #050505;
        border: 1px solid #334155;
        border-radius: 10px;
        padding: 5px 12px;
        margin-bottom: 20px;
        position: relative;
        transition: 0.3s;
      }

      .input-box:focus-within {
        border-color: #a020f0;
        /* Purple Focus */
      }

      .input-box input {
        background: transparent;
        border: none;
        outline: none;
        color: white;
        flex: 1;
        padding: 10px 5px;
        font-size: 15px;
      }

      .toggle-btn {
        cursor: pointer;
        color: #94a3b8;
        font-size: 18px;
      }

      /* Button Styling */
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #a020f0;
        /* Purple Button */
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s ease;
        font-weight: 600;
        margin-top: 5px;
      }

      button:hover {
        background: #8219c4;
        transform: translateY(-2px);
      }

      /* Footer Links */
      .links {
        display: flex;
        justify-content: space-between;
        margin-top: 20px;
      }

      .links a {
        text-decoration: none;
        color: #a020f0;
        /* Purple Links */
        font-size: 14px;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* Mobile Adjustment */
      @media (max-width: 480px) {
        .container {
          padding: 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript
      ><iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe
    ></noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
      <h2 class="login-heading">Login</h2>

      <!-- Browser signal ke liye FORM tag add kiya hai -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <!-- Email Input -->
        <label>Email Address</label>
        <div class="input-box">
          <!-- name="email" aur autocomplete zaroori hai -->
          <input
            id="email"
            name="email"
            type="email"
            placeholder="example@mail.com"
            autocomplete="username"
            required
          />
        </div>

        <!-- Password Input -->
        <label>Password</label>
        <div class="input-box">
          <!-- name="password" aur autocomplete="current-password" zaroori hai -->
          <input
            id="password"
            name="password"
            type="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          />
          <span
            class="toggle-btn"
            id="toggleBtn"
            onclick="togglePassword()"
            style="cursor: pointer"
            >👁️</span
          >
        </div>

        <!-- Login Action: type="submit" browser ko signal deta hai -->
        <button type="submit" id="loginBtn">Login to Account</button>
      </form>

      <!-- Navigation Links -->
      <div class="links">
        <a href="forgot.html">Forgot Password?</a>
        <a href="register.html">Register</a>
      </div>
    </div>

    <script src="config.js"></script>
    <script>
      const API_URL = `${window.API_BASE_URL}/api/auth`;

      // 1. Redirect logic hata diya taaki tum login page dekh sako
      // Agar future mein chahiye toh tabhi lagana jab Logout functionality set ho jaye.

      // 2. Toggle Password Visibility
      function togglePassword() {
        const pass = document.getElementById("password");
        const btn = document.getElementById("toggleBtn");
        pass.type = pass.type === "password" ? "text" : "password";
        btn.textContent = pass.type === "password" ? "👁️" : "🙈";
      }

      // 3. Email Validation logic
      function validateEmail(email) {
        return String(email)
          .toLowerCase()
          .match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
      }

      // 4. Main Login Logic
      async function handleLogin(e) {
        if (e) e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value;
        const btn = document.getElementById("loginBtn");

        if (!email || !validateEmail(email)) return alert("Invalid Email!");
        if (!password) return alert("Password Required!");

        btn.innerText = "Processing...";
        btn.disabled = true;

        try {
          const res = await fetch(`${window.API_BASE_URL}/api/auth/login`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ email, password }),
          });

          const data = await res.json();

          if (res.ok) {
            localStorage.clear();

            // 1. Data Save Karo
            localStorage.setItem("token", data.token);
            localStorage.setItem("userData", JSON.stringify(data.user));
            localStorage.setItem("role", data.user.role);
            localStorage.setItem("username", data.user.name);

            // --- YAHAN ALERT ADD KIYA HAI ---
            if (data.user.role === "admin") {
              alert("Welcome Admin! 🚀 Dashboard Access Granted.");
            } else {
              alert("Login Success! 🚀 Redirecting to Home.");
            }
            // -------------------------------

            // 2. 🔥 Yahan ho rahi hai redirection (Role-based)
            setTimeout(() => {
              if (data.user.role === "admin") {
                window.location.href = "dashboard.html";
              } else {
                window.location.href = "index.html";
              }
            }, 800);
          } else {
            alert(data.msg || "Login Failed!");
            btn.innerText = "Login to Account";
            btn.disabled = false;
          }
        } catch (err) {
          alert("Server Connection Error!");
          btn.innerText = "Login to Account";
          btn.disabled = false;
        }
      }

      // 5. Enter Key Support
      document.addEventListener("keypress", (e) => {
        if (e.key === "Enter") {
          const activeElem = document.activeElement;
          if (activeElem.id === "email" || activeElem.id === "password") {
            handleLogin();
          }
        }
      });
    </script>
    <script></script>
  </body>
</html>
