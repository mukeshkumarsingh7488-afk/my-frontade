<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BR30 Official Verification - MSME REGISTERED</title>

    <!-- 🎥 QR Scanner Library -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        body {
            background: #050505;
            color: #ffffff;
            font-family: 'Poppins', sans-serif;
            margin: 0;
            padding: 20px;
            text-align: center;
        }

        .verify-card {
            max-width: 500px;
            margin: 40px auto;
            background: #111;
            padding: 30px;
            border-radius: 25px;
            border: 2px solid #00ff88;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        h2 {
            color: #00ff88;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        /* Input & Button */
        input {
            width: 90%;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            background: #000;
            color: #00ff88;
            margin-bottom: 15px;
            font-weight: bold;
            text-align: center;
        }

        button {
            width: 100%;
            padding: 15px;
            background: #00ff88;
            color: #000;
            font-weight: 900;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.3s;
        }

        button:hover {
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.4);
            transform: scale(1.02);
        }

        /* 📸 Camera Section */
        #reader {
            width: 100%;
            border-radius: 15px;
            overflow: hidden;
            margin-top: 20px;
            border: 1px dashed #00ff88;
        }

        /* ✅ Result Section */
        #result-box {
            display: none;
            margin-top: 25px;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #00ff88;
            background: rgba(0, 255, 136, 0.05);
            text-align: left;
            animation: fadeIn 0.5s ease;
        }

        .status-tag {
            background: #00ff88;
            color: #000;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: 900;
            font-size: 12px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>

    <div class="verify-card">
        <img src="images/BR30™  LOGO.jpeg" alt="BR30" width="80" style="margin-bottom: 10px;">
        <h2>🛡️ BR30 VERIFICATION</h2>
        <p style="color: #94a3b8; font-size: 13px;">Official MSME Registered Academy Verification System</p>

        <!-- ⌨️ SEARCH BOX -->
        <input type="text" id="certInput" placeholder="ENTER CERTIFICATE NO BR30-123456">
        <button onclick="verifyCert()">VERIFY CERTIFICATE ✅</button>

        <div style="margin: 25px 0; color: #333; font-weight: bold;">-- OR SCAN QR CODE --</div>

        <!-- 🎥 CAMERA SCANNER -->
        <div id="reader"></div>

        <!-- 🏆 VERIFICATION RESULT -->
        <div id="result-box">
            <span class="status-tag">OFFICIALLY VERIFIED✅</span>
            <h3 id="res-name" style="margin: 15px 0 5px 0; color: #00ff88;"></h3>
            <p id="res-course" style="margin: 0; color: #cbd5e1; font-size: 14px;"></p>
            <p id="res-date" style="margin-top: 10px; color: #94a3b8; font-size: 12px;"></p>
        </div>
    </div>

      <script src="config.js"></script>
    <script>
        // 🎥 1. Camera Scanner Logic
        const html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            let id = decodedText;
            if (decodedText.includes('id=')) {
                id = decodedText.split('id=')[1];
            }
            document.getElementById('certInput').value = id;
            verifyCert();
        });

        // 🔍 2. Verification API Logic (FIXED: Date & Download Button)
        async function verifyCert() {
            const certId = document.getElementById('certInput').value.trim();
            const resBox = document.getElementById('result-box');

            if (!certId) return alert("Bhai, ID toh dalo!");

            try {
                const res = await fetch(window.API_BASE_URL + `/api/auth/verify-certificate/${certId}`);
                const data = await res.json();

                if (data.success) {
                    resBox.style.display = "block";
                    document.getElementById('res-name').innerText = data.studentName.toUpperCase();
                    document.getElementById('res-course').innerText = data.course;

                    // 📅 3. DATE FORMATTING
                    const dateObj = new Date(data.issueDate);
                    const formattedDate = isNaN(dateObj) ? new Date().toLocaleDateString('en-IN') : dateObj.toLocaleDateString('en-IN');
                    document.getElementById('res-date').innerText = "Issued on: " + formattedDate;

                    // 📥 4. DYNAMIC DOWNLOAD BUTTON (Golden Touch)
                    const oldBtn = document.getElementById('dl-btn');
                    if (oldBtn) oldBtn.remove(); // Purana button hatao

                    const dlBtn = document.createElement('button');
                    dlBtn.id = 'dl-btn';
                    dlBtn.innerHTML = "DOWNLOAD CERTIFICATE 📥";
                    dlBtn.style.cssText = "width:100%; padding:12px; margin-top:20px; background:#D4AF37; color:#000; border:none; border-radius:10px; font-weight:900; cursor:pointer; text-transform:uppercase; letter-spacing:1px; transition: 0.3s;";

                    // Hover Effect
                    dlBtn.onmouseover = () => dlBtn.style.boxShadow = "0 0 15px rgba(212, 175, 55, 0.5)";
                    dlBtn.onmouseout = () => dlBtn.style.boxShadow = "none";

                    // 🔥 Target Blank Link
                    dlBtn.onclick = () => window.open(data.downloadUrl, '_blank');

                    resBox.appendChild(dlBtn);
                    resBox.scrollIntoView({ behavior: 'smooth' });
                } else {
                    alert("❌ Invalid Certificate ID!");
                    resBox.style.display = "none";
                }
            } catch (err) {
                alert("Bhai, server connection fail!");
            }
        }

        // 5. Auto-load agar URL mein ID hai
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');
            if (id) {
                document.getElementById('certInput').value = id;
                verifyCert();
            }
        };
    </script>

</body>

</html>
