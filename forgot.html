<html lang="en">
  <head>

    <!-- ✅ Basic -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ SEO -->
    <title>Forgot Password | BR30 Trader</title>
    <meta
      name="description"
      content="Reset your BR30 Trader account password securely. Enter your email and get a reset link instantly."
    />
    <meta name="robots" content="noindex, nofollow" />

    <!-- 🔐 (Optional but good) -->
    <meta http-equiv="Cache-Control" content="no-store" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="favicon.ico" type="image/x-icon" />

    <!-- ✅ Google Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />

    <!-- ✅ SweetAlert -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11" defer></script>

    <style>
      /* =========================================
           GLOBAL & BODY STYLES
        ========================================= */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background-color: #050505;
        /* Aapka bataya hua Body Color */
        padding: 20px;
      }

      /* =========================================
           CONTAINER (Mobile Friendly)
        ========================================= */
      .container {
        width: 100%;
        max-width: 360px;
        background: #1e293b;
        /* Premium Dark Card */
        padding: 30px;
        border-radius: 20px;
        border: 1px solid #334155;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      }

      h2 {
        text-align: center;
        color: #ffffff;
        /* White Big Text */
        margin-bottom: 25px;
        font-weight: 600;
      }

      /* Input Styling */
      input {
        width: 100%;
        padding: 12px 15px;
        margin-bottom: 15px;
        border-radius: 10px;
        border: 1px solid #334155;
        background: #050505;
        /* Input background matches body */
        color: white;
        outline: none;
        transition: 0.3s;
      }

      input:focus {
        border-color: #a020f0;
        /* Aapka Purple Color */
      }

      /* Purple Button */
      button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #a020f0;
        /* Purple */
        color: white;
        cursor: pointer;
        transition: 0.3s ease;
        font-weight: 600;
        font-size: 16px;
      }

      button:hover {
        background: #8b1ad4;
        /* Slightly darker purple on hover */
        transform: translateY(-2px);
      }

      /* Footer Links */
      .links {
        display: flex;
        justify-content: center;
        margin-top: 20px;
      }

      .links a {
        text-decoration: none;
        color: #a020f0;
        /* Purple Link */
        font-size: 14px;
        font-weight: 500;
      }

      .links a:hover {
        text-decoration: underline;
      }

      /* Password Toggle Icon */
      .input-box {
        position: relative;
        width: 100%;
      }

      .toggle-btn {
        position: absolute;
        right: 15px;
        top: 12px;
        cursor: pointer;
        color: #94a3b8;
        font-size: 18px;
      }

      /* Mobile Adjustment */
      @media (max-width: 480px) {
        .container {
          padding: 20px;
        }

        h2 {
          font-size: 20px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Google Tag Manager (noscript) -->
    <noscript></noscript>
      <iframe
        src="https://www.googletagmanager.com/ns.html?id=GTM-TT7SLZ4L"
        height="0"
        width="0"
        style="display: none; visibility: hidden"
      ></iframe>
    </noscript>
    <!-- End Google Tag Manager (noscript) -->
    <div class="container">
      <h2 class="login-heading">Reset Password</h2>

      <!-- SECTION 1: REQUEST OTP (Wrapped in FORM) -->
      <form id="request-section" onsubmit="handleRequestOTP(event)">
        <p
          style="
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin-bottom: 15px;
          "
        >
          Enter email to receive reset code.
        </p>
        <label>Email Address</label>
        <div class="input-box">
          <!-- name="email" added -->
          <input
            id="resetEmail"
            name="email"
            type="email"
            placeholder="example@mail.com"
            autocomplete="username"
            required
          />
        </div>
        <button type="submit" id="reqBtn">Send Reset OTP</button>
      </form>

      <!-- SECTION 2: RESET PASSWORD (Wrapped in FORM) -->
      <form
        id="reset-section"
        style="display: none"
        onsubmit="handleResetPassword(event)"
      >
        <label>6-Digit OTP</label>
        <div class="input-box">
          <input
            id="resetOtp"
            name="otp"
            type="number"
            placeholder="Ex: 123456"
            required
          />
        </div>

        <label>New Password</label>
        <div class="input-box">
          <!-- autocomplete="new-password" is key for Google Prompt -->
          <input
            id="newPassword"
            name="password"
            type="password"
            placeholder="8+ chars, 1 Special"
            autocomplete="new-password"
            required
          />
          <span
            class="toggle-btn"
            id="toggleBtn"
            onclick="togglePassword()"
            style="cursor: pointer"
          >
            👁️
          </span>
        </div>

        <button type="submit" id="resetBtn">Update Password</button>

        <!-- Resend Timer -->
        <div style="text-align: center; margin-top: 15px">
          <p id="timerText" style="font-size: 12px; color: #94a3b8">
            Resend in
            <span id="timer">30</span>
            s
          </p>
          <button
            type="button"
            id="resendBtn"
            onclick="handleRequestOTP(event)"
            style="
              display: none;
              background: none;
              color: #3b82f6;
              border: none;
              cursor: pointer;
              text-decoration: underline;
              font-size: 13px;
            "
          >
            Resend OTP
          </button>
        </div>
      </form>

      <div class="links">
        <a href="login.html">Back to Login</a>
      </div>
    </div>

    <script src="js/config.js"></script>
   
    <script src="js/security.js"></script>
      <script src="js/forgot.js"></script>
  </body>
</html>
